name: AccessLint Published Action Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Stable public target for end-to-end action validation.
      # Update this in one place if the maintainer smoke target ever changes.
      ACCESSLINT_SMOKE_URL: https://www.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run AccessLint action
        id: accesslint
        uses: a11ymind/accesslint@v1
        with:
          url: ${{ env.ACCESSLINT_SMOKE_URL }}
          fail-on: none
          output-json: true
          output-markdown: true

      - name: Verify action outputs and report files
        shell: bash
        run: |
          set -euo pipefail

          test -n "${{ steps.accesslint.outputs.score }}"
          test -n "${{ steps.accesslint.outputs.total-risks }}"
          test -n "${{ steps.accesslint.outputs.threshold-exceeded }}"
          test -n "${{ steps.accesslint.outputs.json-path }}"
          test -n "${{ steps.accesslint.outputs.markdown-path }}"

          test -f "${{ steps.accesslint.outputs.json-path }}"
          test -f "${{ steps.accesslint.outputs.markdown-path }}"

          grep -q '"score"' "${{ steps.accesslint.outputs.json-path }}"
          grep -q '# AccessLint scan summary' "${{ steps.accesslint.outputs.markdown-path }}"

      - name: Upload AccessLint smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accesslint-smoke-report
          if-no-files-found: error
          path: |
            ${{ steps.accesslint.outputs.json-path }}
            ${{ steps.accesslint.outputs.markdown-path }}
