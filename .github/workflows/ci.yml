name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/accessly_ci?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-cron-secret
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
      STRIPE_STARTER_PRICE_ID: price_ci_starter_dummy
      STRIPE_PRO_PRICE_ID: price_ci_pro_dummy
      ANTHROPIC_API_KEY: ci-anthropic-dummy
      RESEND_API_KEY: re_ci_dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', 'tests/**/*.ts', 'next.config.*', 'tailwind.config.*', 'postcss.config.*', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build action bundle
        run: npm run action:build

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck
